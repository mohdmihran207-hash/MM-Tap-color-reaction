<!DOCTYPE html>

<head>

<title>MM Tap Reaction Game - Test Your Reaction Speed Online</title>
<meta name="description" content="Play MM Tap Reaction App online – test your speed and reaction with colorful buttons!">
<meta name="keywords" content="MM Tap Reaction, Reaction Game, Online Game, Fast Tap, Browser Game">
<meta name="author" content="Mohd Mihran">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
  }

  h1 {
    text-align: center;
    margin-top: 20px;
  }

  #timer {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 24px;
    background: rgba(0,0,0,0.3);
    padding: 10px 15px;
    border-radius: 10px;
  }

  #colorBox {
    width: 200px;
    height: 200px;
    margin-top: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    border-radius: 20px;
    cursor: default;
    user-select: none;
    transition: all 0.2s ease;
  }

  #buttons {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }

  .colorButton {
    width: 80px;
    height: 80px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.1s ease;
  }

  .colorButton:active {
    transform: scale(0.9);
  }

  #score {
    font-size: 24px;
  }

  #startButton {
    margin-bottom: 40px;
    padding: 15px 30px;
    font-size: 24px;
    background-color: orange;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.2s ease;
  }

  #startButton:hover {
    background-color: darkorange;
  }
</style>
</head>
<body>
  <h1>MM - Tap Reaction App</h1>
  <div id="timer">2</div>
  <div id="colorBox"></div>
  <div id="score">Score: 0</div>

  <div id="buttons">
    <button class="colorButton" id="red" style="background-color:red;"></button>
    <button class="colorButton" id="blue" style="background-color:blue;"></button>
    <button class="colorButton" id="yellow" style="background-color:yellow;"></button>
    <button class="colorButton" id="green" style="background-color:green;"></button>
  </div>
 <div id="level">Level: 1</div>
  <button id="startButton">Start 
</div>
  <script src="script.js"></script>
</body>
</html>
